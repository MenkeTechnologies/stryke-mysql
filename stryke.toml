[package]
name = "stryke-mysql"
version = "0.21.0"
description = "MySQL / MariaDB client for stryke. cdylib loaded in-process — persistent mysql::Pool per connection URL across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-mysql"
edition = "2026"

[ffi]
lib-name = "stryke_mysql"
namespace = "MySQL"
exports = [
    "mysql__pkg_version",
    "mysql__version",
    "mysql__ping",
    "mysql__databases",
    "mysql__tables",
    "mysql__schema",
    "mysql__query",
    "mysql__execute",
    "mysql__exec",
    "mysql__insert_many",
    "mysql__dump",
    "mysql__transaction",
    "mysql__call",
    "mysql__query_multi",
    "mysql__explain",
    "mysql__views",
    "mysql__procedures",
    "mysql__indexes",
    "mysql__triggers",
    "mysql__users",
    "mysql__db_size",
    "mysql__processlist",
    "mysql__status",
    "mysql__variables",
    "mysql__engines",
    "mysql__table_size",
    "mysql__kill",
    "mysql__parse_dsn",
    "mysql__build_dsn",
    "mysql__quote_ident",
    "mysql__unquote_ident",
    "mysql__quote_qualified_ident",
    "mysql__parse_qualified_ident",
    "mysql__quote_literal",
    "mysql__quote",
    "mysql__escape_like",
    "mysql__unescape_like",
    "mysql__like_pattern",
    "mysql__unquote_literal",
    "mysql__format_in_list",
    "mysql__parse_in_list",
    "mysql__parse_enum",
    "mysql__build_enum",
    "mysql__enum_index",
    "mysql__enum_value",
    "mysql__set_mask",
    "mysql__set_from_mask",
    "mysql__current_database",
    "mysql__create_database",
    "mysql__drop_database",
    "mysql__column_names",
    "mysql__parse_column_type",
    "mysql__normalize_type",
    "mysql__format_assignments",
    "mysql__format_placeholders",
    "mysql__escape_string",
    "mysql__redact_dsn",
    "mysql__parse_set_value",
    "mysql__build_where_eq",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
