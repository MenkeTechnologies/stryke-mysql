[package]
name = "stryke-mysql"
version = "0.6.0"
description = "MySQL / MariaDB client for stryke. cdylib loaded in-process — persistent mysql::Pool per connection URL across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-mysql"
edition = "2026"

[ffi]
lib-name = "stryke_mysql"
namespace = "MySQL"
exports = [
    "mysql__pkg_version",
    "mysql__version",
    "mysql__ping",
    "mysql__databases",
    "mysql__tables",
    "mysql__schema",
    "mysql__query",
    "mysql__execute",
    "mysql__exec",
    "mysql__insert_many",
    "mysql__dump",
    "mysql__transaction",
    "mysql__call",
    "mysql__query_multi",
    "mysql__explain",
    "mysql__views",
    "mysql__procedures",
    "mysql__indexes",
    "mysql__triggers",
    "mysql__users",
    "mysql__db_size",
    "mysql__processlist",
    "mysql__status",
    "mysql__variables",
    "mysql__engines",
    "mysql__table_size",
    "mysql__kill",
    "mysql__parse_dsn",
    "mysql__build_dsn",
    "mysql__quote_ident",
    "mysql__quote_qualified_ident",
    "mysql__quote_literal",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
