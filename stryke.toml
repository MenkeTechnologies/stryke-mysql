[package]
name = "stryke-mysql"
version = "0.2.1"
description = "MySQL / MariaDB client for stryke. cdylib loaded in-process — persistent mysql::Pool per connection URL across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-mysql"
edition = "2026"

[ffi]
lib-name = "stryke_mysql"
namespace = "MySQL"
exports = [
    "mysql__pkg_version",
    "mysql__version",
    "mysql__ping",
    "mysql__databases",
    "mysql__tables",
    "mysql__schema",
    "mysql__query",
    "mysql__execute",
    "mysql__exec",
    "mysql__insert_many",
    "mysql__dump",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
